server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/huuim_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # 왜: 개발 단계에서 엔티티 변경 시 테이블 자동 반영
    properties:
      hibernate:
        format_sql: true # SQL 가독성 향상
        show_sql: true
        use_sql_comments: true # Hibernate 쿼리 주석 (디버깅 용이)
    open-in-view: false # 왜: 영속성 컨텍스트 범위 명확히 (실무 권장)

logging:
  level:
    org.hibernate.SQL: debug # 실행 SQL 출력
    org.hibernate.orm.jdbc.bind: trace # 바인딩 파라미터 출력 (Hibernate 6 기준)
    org.hibernate.type.descriptor.sql: trace # (하위 호환) 파라미터 추적